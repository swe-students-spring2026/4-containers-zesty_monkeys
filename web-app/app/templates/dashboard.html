{% extends "base.html" %}
 
{% block title %}Dashboard{% endblock %}
 
{% block nav %}
<nav>
    <a href="{{ url_for('main.logout') }}">Log out</a>
</nav>
{% endblock %}
 
{% block content %}
<div class="container" style="margin-top: 2rem;">
    <h1>Presentation Analyzer</h1>
    <h2>Welcome, {{ current_user.username }}!</h2>
</div>
<div class="recorder-card">
    <div id="timer">00:00</div>

    <div>
        <button id="recordBtn">Start Recording</button>
        <button id="submitBtn" disabled>Analyze</button>
    </div>

    <div id="status"></div>

    <audio id="audioPlayer" controls hidden></audio>
</div>
<div id="resultCard" hidden>
    <h3>Transcript</h3>
    <div id="resultText" style="line-height: 1.6;"></div>
    <div id="analysisResult"></div>
</div>
<div class="container" style="margin-top: 2rem;">
    <p style="margin-top: 1rem; color: #555;">Your recordings and analysis results will appear here.</p>
</div>

<script>
let mediaRecorder = null;
let audioChunks = [];
let audioBlob = null;
let timerInterval = null;
let seconds = 0;

const recordBtn = document.getElementById('recordBtn');
const submitBtn = document.getElementById('submitBtn');
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('status');
const resultCard = document.getElementById('resultCard');
const resultText = document.getElementById('resultText');

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>'"]/g, tag => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#39;',
        '"': '&quot;'
    }[tag]));
}

function formatTime(s) {
    const m = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return `${m}:${sec}`;
}

function setStatus(msg) {
    statusEl.textContent = msg;
}

async function startRecording() {
    try {
        audioPlayer.hidden = true;
        audioPlayer.src = '';

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

            const audioURL = URL.createObjectURL(audioBlob);
            audioPlayer.src = audioURL;
            audioPlayer.hidden = false;

            submitBtn.disabled = false;
            setStatus('Recording ready.');
        };

        mediaRecorder.start();

        recordBtn.textContent = 'Stop Recording';
        submitBtn.disabled = true;

        seconds = 0;
        timerEl.textContent = formatTime(0);

        timerInterval = setInterval(() => {
            seconds++;
            timerEl.textContent = formatTime(seconds);
        }, 1000);

        setStatus('Recording...');

    } catch {
        setStatus('Microphone access denied.');
    }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }

    clearInterval(timerInterval);
    recordBtn.textContent = 'Start Recording';
}

recordBtn.onclick = () => {
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        startRecording();
    } else {
        stopRecording();
    }
};

submitBtn.onclick = async () => {
    if (!audioBlob) return;

    submitBtn.disabled = true;
    setStatus('Uploading...');
    resultCard.hidden = true;

    const formData = new FormData();
    formData.append('audio', audioBlob, 'audio.webm');

    try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        console.log("upload response:", JSON.stringify(data));

        if (!res.ok) {
            setStatus(data.error || 'Error');
        } else {
            resultText.innerHTML = highlightTranscript(data.transcript, data.analysis?.grammar_errors);
            renderAnalysis(analysisResult, data.analysis);
            resultCard.hidden = false;
            setStatus('Done.');
        }
    } catch {
        setStatus('Server error.');
    } finally {
        submitBtn.disabled = false;
    }
};

function rateWpm(wpm) {
    if (wpm == null) return '—';
    if (wpm < 30) return 'Too slow';
    if (wpm < 50) return 'Slow';
    if (wpm < 100) return 'Average';
    if (wpm < 120) return 'Fast';
    return 'Too fast';
}

function renderOverusedWords(words) {
    if (!words || words.length === 0) return '';
    const items = words.map(([w, c]) => `<li>${w} (${c}x)</li>`).join('');
    return `<p><strong>Overused words:</strong></p><ul>${items}</ul>`;
}

function highlightTranscript(transcript, errors) {
    if (!transcript) return '';
    if (!errors || errors.length === 0) return escapeHtml(transcript);

    const sortedErrors = [...errors].sort((a, b) => b.offset - a.offset);
    
    let htmlTranscript = transcript;

    for (const e of sortedErrors) {
        const offset = e.offset;
        const length = e.length;

        const before = htmlTranscript.substring(0, offset);
        const errorText = htmlTranscript.substring(offset, offset + length);
        const after = htmlTranscript.substring(offset + length);

        const suggestionText = e.replacements && e.replacements.length
            ? ` — try: ${e.replacements.join(', ')}`
            : '';
        const tooltipContent = `${e.message}${suggestionText}`;

        const highlighted = `<span class="grammar-error" data-tooltip="${escapeHtml(tooltipContent)}">${escapeHtml(errorText)}</span>`;

        htmlTranscript = before + highlighted + after;
    }

    return htmlTranscript;
}

function renderAnalysis(container, analysis) {
    if (!analysis) { container.innerHTML = ''; return; }
    container.innerHTML = `
        <p><strong>Words per minute:</strong> ${analysis.wpm ?? '—'} (${rateWpm(analysis.wpm)})</p>
        <p><strong>Filler words:</strong> ${analysis.filler_word_count ?? '—'}</p>
        <p><strong>Sentence length:</strong> ${analysis.sentence_length_rating ?? '—'}</p>
        <p><strong>Clause length:</strong> ${analysis.clause_length_rating ?? '—'}</p>
        ${renderOverusedWords(analysis.overused_words)}
    `;
}

async function loadHistory() {
    const container = document.getElementById('historyList');

    try {
        const res = await fetch('/entries');
        const entries = await res.json();

        container.innerHTML = '';

        if (!entries || entries.length === 0) {
            container.innerHTML = '<p>No recordings yet.</p>';
            return;
        }

        entries.forEach(entry => {
            const card = document.createElement('div');
            const date = entry.recorded_at
                ? new Date(entry.recorded_at).toLocaleString()
                : 'Unknown date';

            const analysisDiv = document.createElement('div');

            const transcriptHtml = highlightTranscript(entry.transcript, entry.analysis?.grammar_errors);

            card.innerHTML = `
                <hr>
                <p><strong>${date}</strong> — ${entry.language ?? ''}</p>
                ${entry.audio_path
                    ? `<audio controls src="/audio/${entry.audio_path}"></audio>`
                    : '<p><em>No audio available.</em></p>'}
                <details>
                    <summary>Transcript</summary>
                    <p style="line-height: 1.6;">${transcriptHtml}</p>
                </details>
            `;

            card.appendChild(analysisDiv);
            renderAnalysis(analysisDiv, entry.analysis);
            container.appendChild(card);
        });

    } catch (e) {
        console.error(e);
        container.innerHTML = '<p>Failed to load history.</p>';
    }
}

loadHistory();
</script>
{% endblock %}
